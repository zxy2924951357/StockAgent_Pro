<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>EasyQuant - 简易量化终端</title>
    <style>
        :root { --bg: #000; --panel: #121317; --border: #23252b; --text: #d1d5db; --up: #f03c50; --down: #1ebd60; --active: #2563eb; }
        body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 75px; background: #0a0a0c; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .nav-item { width: 100%; padding: 18px 0; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #6b7280; transition: 0.2s; border-left: 3px solid transparent; font-size: 13px; gap: 8px;}
        .nav-item:hover { color: #fff; background: #1c1d22; }
        .nav-item.active { color: var(--active); border-left: 3px solid var(--active); background: var(--panel); font-weight: bold;}
        .nav-icon { font-size: 22px; font-family: monospace;}

        .main-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden;}
        .top-ticker { background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 12px 25px; gap: 40px; }
        .top-ticker-data { display: flex; gap: 40px; flex: 1; }
        .last-update { margin-left: auto; color: #6b7280; font-size: 12px; font-family: Consolas, monospace; }

        .page-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .page-view.active { display: flex; }
        .toolbar { padding: 15px 25px; background: var(--bg); display: flex; gap: 12px; align-items: center; border-bottom: 1px solid var(--border); }
        .search-box { position: relative; display: flex; align-items: center; gap: 10px; }
        .toolbar input { background: #000; border: 1px solid #333; color: #fff; padding: 7px 12px; border-radius: 4px; outline: none; }
        .search-dropdown { position: absolute; top: 40px; left: 0; width: 250px; background: var(--panel); border: 1px solid #333; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 1000; max-height: 250px; overflow-y: auto; display: none; }
        .search-item { padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #1c1d22; transition: 0.2s;}
        .search-item:hover { background: #2563eb; color: #fff; }
        .search-item-code { color: #9ca3af; font-family: Consolas, monospace; font-size: 13px; }
        .toolbar button { background: var(--active); color: #fff; border: none; padding: 7px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .toolbar button:hover { background: #1d4ed8; }

        .table-wrap { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { color: #6b7280; font-weight: normal; padding: 14px 25px; border-bottom: 1px solid var(--border); font-size: 13px; position: sticky; top: 0; background: var(--panel); z-index: 5;}
        td { padding: 14px 25px; border-bottom: 1px solid #14151a; font-size: 15px; font-family: Consolas, monospace; transition: background-color 0.3s; }
        .stock-name { font-weight: bold; color: #fff; text-align: left; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-weight: bold; min-width: 65px; text-align: center; color: #fff; }
        .bg-up { background: var(--up); } .bg-down { background: var(--down); }
        .text-up { color: var(--up); } .text-down { color: var(--down); }

        @keyframes flash-up { 0% { background-color: rgba(240, 60, 80, 0.3); } 100% { background-color: transparent; } }
        @keyframes flash-down { 0% { background-color: rgba(30, 189, 96, 0.3); } 100% { background-color: transparent; } }
        .flash-up { animation: flash-up 0.8s ease-out; }
        .flash-down { animation: flash-down 0.8s ease-out; }

        .hotspot-container { flex: 1; overflow-y: auto; padding: 25px; background: #0a0a0c;}
        .hotspot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .hotspot-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 18px; transition: transform 0.2s; }
        .hotspot-card:hover { transform: translateY(-3px); border-color: #444; }
        .hc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .hc-name { font-size: 16px; font-weight: bold; color: #fff; }
        .hc-leader { font-size: 13px; color: #94a3b8; background: #000; padding: 10px 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;}

        /* 统一交互入口：智能聊天侧边栏 */
        .chat-sidebar { width: 450px; background: var(--panel); display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: absolute; right: 0; top: 0; bottom: 0; z-index: 50; box-shadow: -10px 0 30px rgba(0,0,0,0.6); border-left: 1px solid var(--border);}
        .chat-sidebar.open { transform: translateX(0); }
        .chat-header { padding: 18px 25px; background: #111; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-header b { color: #fff; font-size: 16px; }
        .chat-header span.subtitle { font-size: 12px; color: #6b7280; margin-left: 10px; font-weight: normal; }

        .chat-history { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #0a0a0c; scroll-behavior: smooth; }
        .chat-msg { max-width: 90%; line-height: 1.7; font-size: 14px; padding: 15px 20px; border-radius: 8px; word-wrap: break-word; white-space: pre-wrap; }
        .user-msg { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .agent-msg { background: #1c1d22; color: #d1d5db; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }

        .chat-input-area { padding: 15px 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .chat-input-area textarea { width: 100%; height: 80px; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; outline: none; resize: none; font-family: inherit; box-sizing: border-box; }
        .chat-input-area textarea:focus { border-color: #2563eb; }
        .chat-tools { display: flex; justify-content: flex-end; }
        .chat-tools button { background: var(--active); color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .chat-tools button:hover { background: #1d4ed8; }
        .chat-tools button:disabled { background: #4b5563; cursor: not-allowed; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="nav-item active" id="nav-watchlist" onclick="switchTab('watchlist')">
            <span class="nav-icon">📈</span><span>盯盘</span>
        </div>
        <div class="nav-item" id="nav-hotspots" onclick="switchTab('hotspots')">
            <span class="nav-icon">🔥</span><span>热点</span>
        </div>
        <div class="nav-item" id="nav-chat" onclick="document.getElementById('chat-sidebar').classList.add('open')">
            <span class="nav-icon">💬</span><span>问答</span>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="top-ticker">
            <div id="top-ticker-data" class="top-ticker-data">⏳ 正在同步大盘数据...</div>
            <div id="last-update-time" class="last-update">等待首次更新...</div>
        </div>

        <div id="view-watchlist" class="page-view active">
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="add-code" placeholder="输入代码/汉字联想" autocomplete="off" oninput="handleSearch(this.value)" onblur="setTimeout(()=>closeSearch(), 200)" style="width: 180px;">
                    <div id="search-dropdown" class="search-dropdown"></div>
                    <input type="text" id="add-name" placeholder="名称" readonly style="background:#0a0a0c; color:#666; cursor:not-allowed; width: 100px;">
                </div>
                <button onclick="addWatchlist()">+ 加入自选</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="text-align: left;">名称/代码</th><th style="width: 100px; text-align: left;">当日走势</th>
                            <th>最新价</th><th>涨跌幅</th><th>成交量</th><th>换手率</th><th>智能操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="7" style="text-align:center; padding: 50px; color:#666;">载入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="view-hotspots" class="page-view">
            <div class="toolbar" style="border-bottom:none; background: #0a0a0c;">
                <b style="color: #fff; font-size: 16px;">全市场资金热点板块</b>
                <span style="margin-left: auto; color: #666; font-size: 12px;">同步刷新</span>
            </div>
            <div class="hotspot-container">
                <div class="hotspot-grid" id="hotspot-grid">
                    <div style="color: #666;">正在直连资金流向数据库...</div>
                </div>
            </div>
        </div>

        <div class="chat-sidebar" id="chat-sidebar">
            <div class="chat-header">
                <div>
                    <b>📈 简易量化 (EasyQuant)</b>
                    <span class="subtitle">LangGraph 双轨调度引擎</span>
                </div>
                <span style="cursor: pointer; font-size: 24px; color:#666;" onclick="closeChat()">×</span>
            </div>

            <div class="chat-history" id="chat-history">
                <div class="chat-msg agent-msg">你好！我是你的专属 AI 调度系统。
你可以：
1. 在左侧点击【诊断】按钮，我会调度【研报专员】生成深度分析。
2. 在下方直接打字，询问大盘热点、支撑均线、个股估值等事实信息，我会调度【问答专员】进行解答。</div>
            </div>

            <div class="chat-input-area">
                <textarea id="chat-input" placeholder="输入你想咨询的股票或问题，按 Ctrl+Enter 发送..." onkeydown="if(event.ctrlKey && event.keyCode==13) sendChatMessage()"></textarea>
                <div class="chat-tools">
                    <button id="send-btn" onclick="sendChatMessage()">发 送</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const API_BASE = "http://127.0.0.1:8000/api";
    let watchlist = [];
    let isPolling = false;
    let currentTab = 'watchlist';
    let searchTimer = null;

    function updateTimeStatus() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
        document.getElementById('last-update-time').innerText = `最后刷新: ${timeStr}`;
    }

    // ==========================================
    // 🌟 统一聊天与调度逻辑 (已修复气泡覆盖问题)
    // ==========================================
    function closeChat() {
        document.getElementById('chat-sidebar').classList.remove('open');
    }

    function appendMessage(role, text) {
        const historyEl = document.getElementById('chat-history');
        const msgDiv = document.createElement('div');
        const msgId = 'msg-' + Date.now() + Math.floor(Math.random() * 1000); // 确保 ID 绝对唯一
        msgDiv.id = msgId;
        msgDiv.className = `chat-msg ${role}-msg`;
        msgDiv.innerText = text;
        historyEl.appendChild(msgDiv);
        historyEl.scrollTop = historyEl.scrollHeight;
        return msgId;
    }

    async function sendChatMessage(presetText = null) {
        const inputEl = document.getElementById('chat-input');
        const text = presetText || inputEl.value.trim();
        if (!text) return;

        // 打开侧边栏
        document.getElementById('chat-sidebar').classList.add('open');

        // 用户消息上屏 (蓝色气泡)
        appendMessage('user', text);
        if (!presetText) inputEl.value = '';

        // 锁定按钮状态
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.innerText = '分析中...';

        // 创建占位符气泡 (深灰色) 并记录 ID
        const loadingId = appendMessage('agent', '🔎 正在检索实时行情与知识库...');

        try {
            const res = await fetch(`${API_BASE}/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query: text })
            });
            const data = await res.json();

            // 精准抓取刚才那个占位符气泡
            const msgEl = document.getElementById(loadingId);

            if (res.ok && data.code === 200) {
                // 原地替换文字内容，不会产生新气泡
                msgEl.innerText = data.data.reply;
            } else {
                msgEl.innerText = `⚠️ 异常: ${data.detail || '智能体执行失败'}`;
                msgEl.style.color = '#f03c50';
            }
        } catch (e) {
            const msgEl = document.getElementById(loadingId);
            msgEl.innerText = `⚠️ 网络连接中断，无法连接到后端调度器。`;
            msgEl.style.color = '#f03c50';
        } finally {
            // 恢复 UI 状态，并确保滚动条在最底部
            btn.disabled = false;
            btn.innerText = '发 送';
            const historyEl = document.getElementById('chat-history');
            historyEl.scrollTop = historyEl.scrollHeight;
        }
    }

    function triggerAI(ts_code, name) {
        const prompt = `请帮我生成一份关于【${name}】(${ts_code}) 的深度诊断研报。`;
        sendChatMessage(prompt);
    }

    // ==========================================
    // 🌟 行情抓取与表格逻辑
    // ==========================================
    async function handleSearch(keyword) {
        const dropdown = document.getElementById('search-dropdown');
        if (!keyword.trim()) {
            dropdown.style.display = 'none';
            document.getElementById('add-name').value = '';
            return;
        }
        clearTimeout(searchTimer);
        searchTimer = setTimeout(async () => {
            try {
                const res = await fetch(`${API_BASE}/market/search?keyword=${encodeURIComponent(keyword.trim())}`).then(r => r.json());
                if (res.code === 200 && res.data.length > 0) {
                    dropdown.innerHTML = res.data.map(s => `
                        <div class="search-item" onclick="selectStock('${s.ts_code}', '${s.name}')">
                            <span>${s.name}</span><span class="search-item-code">${s.ts_code}</span>
                        </div>
                    `).join('');
                    dropdown.style.display = 'block';
                } else {
                    dropdown.innerHTML = `<div style="padding:10px 15px; color:#666;">无匹配结果</div>`;
                    dropdown.style.display = 'block';
                }
            } catch(e) {}
        }, 300);
    }

    function selectStock(ts_code, name) {
        document.getElementById('add-code').value = ts_code;
        document.getElementById('add-name').value = name;
        document.getElementById('search-dropdown').style.display = 'none';
    }

    function closeSearch() { document.getElementById('search-dropdown').style.display = 'none'; }

    function switchTab(tabId) {
        currentTab = tabId;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${tabId}`).classList.add('active');
        document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${tabId}`).classList.add('active');
        if(tabId === 'watchlist') { pollRealtime(); pollTrends(); }
        if(tabId === 'hotspots') fetchHotspots();
    }

    function drawTrend(id, prices, isUp) {
        const container = document.getElementById(`spark-${id}`);
        if (!container || !prices.length) return;
        const color = isUp ? '#f03c50' : '#1ebd60';
        const min = Math.min(...prices), max = Math.max(...prices), range = max - min || 1;
        const points = prices.map((p, i) => `${(i / (prices.length - 1)) * 80},${24 - ((p - min) / range) * 20 - 2}`).join(' ');
        container.innerHTML = `<svg width="80" height="24"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
    }

    async function fetchIndices() {
        try {
            const res = await fetch(`${API_BASE}/market/indices`).then(r => r.json());
            if (res.code === 200 && res.data && res.data.length > 0) {
                document.getElementById('top-ticker-data').innerHTML = res.data.map(i => `<div style="display:flex; gap:10px; align-items:baseline;">
                    <span style="color:#888; font-size:13px;">${i.name}</span>
                    <b class="${i.change_pct>=0?'text-up':'text-down'}" style="font-size:18px; font-family:Consolas;">${i.price.toFixed(2)}</b>
                    <span class="${i.change_pct>=0?'text-up':'text-down'}" style="font-size:13px; font-weight:bold;">${i.change_pct>0?'+':''}${i.change_pct.toFixed(2)}%</span>
                </div>`).join(' <div style="color:#333;">|</div> ');
                updateTimeStatus();
            }
        } catch(e) {}
    }

    async function pollRealtime() {
        if (isPolling || watchlist.length === 0 || currentTab !== 'watchlist') return;
        isPolling = true;
        try {
            const res = await fetch(`${API_BASE}/market/realtime`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(watchlist.map(s => s.ts_code))
            }).then(r => r.json());

            if (res.code === 200 && res.data && res.data.length > 0) {
                res.data.forEach(item => {
                    const id = item.code.replace('.', '-');
                    const priceEl = document.getElementById(`price-${id}`);
                    if (!priceEl) return;

                    const oldPrice = parseFloat(priceEl.innerText);
                    const newPrice = item.price.toFixed(2);

                    if (oldPrice && oldPrice !== parseFloat(newPrice)) {
                        const flashClass = parseFloat(newPrice) >= oldPrice ? 'flash-up' : 'flash-down';
                        const rowEl = document.getElementById(`row-${id}`);
                        rowEl.classList.remove('flash-up', 'flash-down');
                        void rowEl.offsetWidth;
                        rowEl.classList.add(flashClass);
                    }

                    priceEl.innerText = newPrice;
                    priceEl.className = item.change_pct >= 0 ? 'text-up' : 'text-down';

                    const badge = document.getElementById(`badge-${id}`);
                    badge.innerText = (item.change_pct > 0 ? '+' : '') + item.change_pct.toFixed(2) + '%';
                    badge.className = `badge ${item.change_pct >= 0 ? 'bg-up' : 'bg-down'}`;

                    document.getElementById(`vol-${id}`).innerText = (item.volume / 10000).toFixed(1) + "万";
                    document.getElementById(`turn-${id}`).innerText = item.turnover.toFixed(2) + "%";
                });
                updateTimeStatus();
            }
        } catch(e){} finally { isPolling = false; }
    }

    async function pollTrends() {
        if (watchlist.length === 0 || currentTab !== 'watchlist') return;
        await Promise.all(watchlist.map(async (stock) => {
            const id = stock.ts_code.replace('.', '-');
            const badge = document.getElementById(`badge-${id}`);
            const isUp = badge ? !badge.className.includes('bg-down') : true;
            try {
                const t = await fetch(`${API_BASE}/market/trend?ts_code=${stock.ts_code}`).then(r => r.json());
                if(t.code === 200 && t.data.length > 0) drawTrend(id, t.data, isUp);
            } catch(e) {}
        }));
    }

    async function fetchHotspots() {
        if (currentTab !== 'hotspots') return;
        try {
            const res = await fetch(`${API_BASE}/market/hotspots?limit=24`).then(r => r.json());
            if (res.code === 200 && res.data && res.data.length > 0) {
                document.getElementById('hotspot-grid').innerHTML = res.data.map(item => `
                    <div class="hotspot-card">
                        <div class="hc-header">
                            <span class="hc-name">${item.sector_name}</span>
                            <span class="badge ${item.change_pct >= 0 ? 'bg-up' : 'bg-down'}">${item.change_pct > 0 ? '+' : ''}${item.change_pct.toFixed(2)}%</span>
                        </div>
                        <div class="hc-leader">
                            <span style="color:#6b7280">龙头领涨</span>
                            <b style="color:#fff">${item.top_stock_name}</b>
                            <span class="${item.top_stock_change >= 0 ? 'text-up' : 'text-down'}">${item.top_stock_change > 0 ? '+' : ''}${item.top_stock_change.toFixed(2)}%</span>
                        </div>
                    </div>
                `).join('');
                updateTimeStatus();
            }
        } catch (e) {}
    }

    async function loadWatchlist() {
        try {
            const res = await fetch(`${API_BASE}/market/watchlist/list`).then(r => r.json());
            if (res.code === 200) {
                const newWatchlist = res.data;
                const tbody = document.getElementById('table-body');

                if (newWatchlist.length === 0) {
                    watchlist = [];
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 50px; color:#666;">暂无自选记录，请在上方搜索并添加</td></tr>`;
                    return;
                }
                if (watchlist.length === 0) tbody.innerHTML = '';

                const addedStocks = newWatchlist.filter(ns => !watchlist.find(os => os.ts_code === ns.ts_code));
                addedStocks.forEach(s => {
                    const id = s.ts_code.replace('.', '-');
                    const tr = document.createElement('tr');
                    tr.id = `row-${id}`;
                    tr.innerHTML = `
                        <td class="stock-name">${s.stock_name}<br><small style="color:#666; font-weight:normal;">${s.ts_code}</small></td>
                        <td id="spark-${id}"><span style="color:#444; font-size:12px;">绘制中...</span></td>
                        <td id="price-${id}">0.00</td>
                        <td><span class="badge" id="badge-${id}">0.00%</span></td>
                        <td id="vol-${id}">0.0万</td><td id="turn-${id}">0.00%</td>
                        <td>
                            <button onclick="triggerAI('${s.ts_code}','${s.stock_name}')" style="color:#2563eb; background:rgba(37,99,235,0.15); border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">[ 诊断 ]</button>
                            <button onclick="removeWatchlist('${s.ts_code}')" style="color:#6b7280; background:none; border:none; cursor:pointer; margin-left:12px;">移除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                    watchlist.push(s);
                    fetchSingleStockData(s);
                });
            }
        } catch(e) {}
    }

    async function fetchSingleStockData(stock) {
        const id = stock.ts_code.replace('.', '-');
        try {
            const res = await fetch(`${API_BASE}/market/realtime`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify([stock.ts_code])
            }).then(r => r.json());
            if (res.code === 200 && res.data && res.data.length > 0) {
                const item = res.data[0];
                const priceEl = document.getElementById(`price-${id}`);
                if (priceEl) {
                    priceEl.innerText = item.price.toFixed(2);
                    priceEl.className = item.change_pct >= 0 ? 'text-up' : 'text-down';
                    const badge = document.getElementById(`badge-${id}`);
                    badge.innerText = (item.change_pct > 0 ? '+' : '') + item.change_pct.toFixed(2) + '%';
                    badge.className = `badge ${item.change_pct >= 0 ? 'bg-up' : 'bg-down'}`;
                    document.getElementById(`vol-${id}`).innerText = (item.volume / 10000).toFixed(1) + "万";
                    document.getElementById(`turn-${id}`).innerText = item.turnover.toFixed(2) + "%";
                }
            }
        } catch(e){}

        try {
            const t = await fetch(`${API_BASE}/market/trend?ts_code=${stock.ts_code}`).then(r => r.json());
            const badge = document.getElementById(`badge-${id}`);
            const isUp = badge ? !badge.className.includes('bg-down') : true;
            if(t.code === 200 && t.data.length > 0) drawTrend(id, t.data, isUp);
        } catch(e) {}
    }

    async function addWatchlist() {
        const raw_input = document.getElementById('add-code').value.trim();
        if (!raw_input) return;

        const res = await fetch(`${API_BASE}/market/watchlist/add`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ts_code: raw_input, stock_name: ""})
        }).then(r => r.json());

        if (res.code === 200) {
            document.getElementById('add-code').value = '';
            document.getElementById('add-name').value = '';
            document.getElementById('search-dropdown').style.display = 'none';
            loadWatchlist();
        } else {
            alert(`⚠️ 添加失败: ${res.msg}`);
        }
    }

    async function removeWatchlist(ts_code) {
        if (!confirm(`确定彻底移除自选 ${ts_code}？`)) return;
        await fetch(`${API_BASE}/market/watchlist/remove?ts_code=${ts_code}`, {method: 'DELETE'});
        const id = ts_code.replace('.', '-');
        const row = document.getElementById(`row-${id}`);
        if (row) row.remove();
        watchlist = watchlist.filter(s => s.ts_code !== ts_code);
        if (watchlist.length === 0) {
            document.getElementById('table-body').innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 50px; color:#666;">暂无自选记录，请在上方搜索并添加</td></tr>`;
        }
    }

    const SAFE_INTERVAL = 240000;
    fetchIndices();
    loadWatchlist();

    setInterval(() => { if(currentTab === 'watchlist') pollRealtime(); }, SAFE_INTERVAL);
    setInterval(() => { if(currentTab === 'watchlist') pollTrends(); }, SAFE_INTERVAL);
    setInterval(() => { if(currentTab === 'hotspots') fetchHotspots(); }, SAFE_INTERVAL);
    setInterval(fetchIndices, SAFE_INTERVAL);

</script>
</body>
</html>
