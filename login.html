<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录系统</title>
    <style>
        :root {
            --bg: #08111f;
            --panel: rgba(9, 20, 36, 0.88);
            --panel-border: rgba(99, 179, 237, 0.18);
            --text: #e6eef8;
            --muted: #8fa3ba;
            --accent: #4da3ff;
            --accent-strong: #2f7de1;
            --danger: #ff6b6b;
            --success: #31c48d;
            --shadow: 0 24px 60px rgba(3, 8, 20, 0.38);
            --input-bg: rgba(5, 13, 24, 0.78);
            --surface: radial-gradient(circle at top, rgba(77, 163, 255, 0.16), transparent 42%), linear-gradient(135deg, #07101d, #0d1f38 55%, #102947);
        }
        :root[data-theme="day"] {
            --bg: #edf4fb;
            --panel: rgba(255, 255, 255, 0.94);
            --panel-border: rgba(69, 135, 216, 0.16);
            --text: #17324d;
            --muted: #69809a;
            --accent: #2d74d6;
            --accent-strong: #1d5bb0;
            --danger: #d14343;
            --success: #149b68;
            --shadow: 0 24px 60px rgba(54, 90, 130, 0.18);
            --input-bg: rgba(244, 248, 253, 0.96);
            --surface: radial-gradient(circle at top, rgba(77, 163, 255, 0.18), transparent 42%), linear-gradient(135deg, #f7fbff, #eef6ff 45%, #dbeafe);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            background: var(--surface);
            color: var(--text);
            transition: background 0.25s ease, color 0.25s ease;
        }
        .auth-box {
            width: 380px;
            padding: 34px 30px 28px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
        }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
        .toolbar-actions { display:flex; gap:10px; }
        .theme-btn, .lang-btn { border: 1px solid var(--panel-border); background: transparent; color: var(--muted); border-radius: 999px; padding: 8px 14px; cursor: pointer; }
        .desc { color: var(--muted); line-height: 1.7; font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 14px; }
        .input-group input { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--panel-border); background: var(--input-bg); color: var(--text); outline: none; font-size: 14px; }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(77, 163, 255, 0.14); }
        .option-row { display: flex; justify-content: space-between; gap: 14px; margin: -2px 0 18px; }
        .option-item { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
        .option-item input { accent-color: var(--accent); }
        .btn { width: 100%; border: none; border-radius: 14px; padding: 12px; font-size: 15px; font-weight: 700; color: #ffffff; background: linear-gradient(135deg, var(--accent), var(--accent-strong)); cursor: pointer; }
        .link-text { margin-top: 16px; text-align: center; font-size: 13px; color: var(--muted); }
        .link-text a { color: var(--accent); text-decoration: none; font-weight: 700; }
        #message { min-height: 22px; margin-top: 14px; text-align: center; font-size: 13px; font-weight: 700; }
    </style>
</head>
<body>
<div class="auth-box">
    <div class="top-row">
        <div class="logo" id="logo-text">量投终端</div>
        <div class="toolbar-actions">
            <button class="lang-btn" id="lang-btn" onclick="toggleLanguage()">EN</button>
            <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">切换到白天</button>
        </div>
    </div>
    
    <div class="input-group">
        <label for="username" id="username-label">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
    </div>
    <div class="input-group">
        <label for="password" id="password-label">密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <div class="option-row">
        <label class="option-item">
            <input type="checkbox" id="remember-password">
            <span id="remember-label">记住密码</span>
        </label>
        <label class="option-item">
            <input type="checkbox" id="auto-login">
            <span id="autologin-label">自动登录</span>
        </label>
    </div>
    <button class="btn" id="login-btn" onclick="handleLogin()">立即登录</button>
    <div class="link-text"><span id="link-prefix">还没有账号？</span><a href="register.html" id="register-link">去注册</a></div>
    <div id="message"></div>
</div>
<script>
    const API_BASE = 'http://127.0.0.1:8000';
    const AUTH_PREF_KEY = 'eq_auth_prefs';
    const SAVED_CRED_KEY = 'eq_saved_credentials';
    const LANG_KEY = 'eq_lang';
    const I18N = {
        'zh-CN': {
            title: '登录系统', logo: '量投终端', themeToDay: '切换到白天', themeToNight: '切换到黑夜',
            username: '用户名', usernamePh: '请输入用户名', password: '密码', passwordPh: '请输入密码',
            remember: '记住密码', autoLogin: '自动登录', login: '立即登录', noAccount: '还没有账号？', register: '去注册',
            fillRequired: '请完整填写用户名和密码', verifying: '正在验证身份...', loginFailed: '登录失败：', retry: '请稍后重试',
            networkError: '网络连接失败，请检查服务是否启动'
        },
        'en-US': {
            title: 'Sign In', logo: 'Quant Terminal', themeToDay: 'Switch to Light', themeToNight: 'Switch to Dark',
            username: 'Username', usernamePh: 'Enter username', password: 'Password', passwordPh: 'Enter password',
            remember: 'Remember password', autoLogin: 'Auto login', login: 'Sign In', noAccount: 'No account yet? ', register: 'Create one',
            fillRequired: 'Please enter both username and password.', verifying: 'Verifying your identity...', loginFailed: 'Login failed: ', retry: 'Please try again later',
            networkError: 'Network error. Please make sure the server is running.'
        }
    };
    function getCurrentLanguage() {
        return localStorage.getItem(LANG_KEY) || 'zh-CN';
    }
    function applyLanguage(lang) {
        const nextLang = I18N[lang] ? lang : 'zh-CN';
        const dict = I18N[nextLang];
        localStorage.setItem(LANG_KEY, nextLang);
        document.documentElement.lang = nextLang === 'en-US' ? 'en' : 'zh-CN';
        document.title = dict.title;
        document.getElementById('logo-text').innerText = dict.logo;
        document.getElementById('username-label').innerText = dict.username;
        document.getElementById('password-label').innerText = dict.password;
        document.getElementById('username').placeholder = dict.usernamePh;
        document.getElementById('password').placeholder = dict.passwordPh;
        document.getElementById('remember-label').innerText = dict.remember;
        document.getElementById('autologin-label').innerText = dict.autoLogin;
        document.getElementById('login-btn').innerText = dict.login;
        document.getElementById('link-prefix').innerText = dict.noAccount;
        document.getElementById('register-link').innerText = dict.register;
        document.getElementById('lang-btn').innerText = nextLang === 'en-US' ? '中文' : 'EN';
        refreshThemeButton();
    }
    function toggleLanguage() {
        applyLanguage(getCurrentLanguage() === 'zh-CN' ? 'en-US' : 'zh-CN');
    }
    function t(key) {
        return (I18N[getCurrentLanguage()] || I18N['zh-CN'])[key] || key;
    }
    function refreshThemeButton() {
        const isNight = (document.documentElement.getAttribute('data-theme') || 'night') === 'night';
        document.getElementById('theme-btn').innerText = isNight ? t('themeToDay') : t('themeToNight');
    }

    function getAuthPrefs() {
        try {
            return JSON.parse(localStorage.getItem(AUTH_PREF_KEY) || '{}');
        } catch (e) {
            return {};
        }
    }
    function saveAuthPrefs(rememberPassword, autoLogin) {
        localStorage.setItem(AUTH_PREF_KEY, JSON.stringify({ rememberPassword, autoLogin }));
    }
    function saveCredentialSnapshot(username, password, rememberPassword) {
        if (rememberPassword) {
            localStorage.setItem(SAVED_CRED_KEY, JSON.stringify({ username, password }));
        } else {
            localStorage.removeItem(SAVED_CRED_KEY);
        }
    }
    function persistAuth(token, username, autoLogin) {
        sessionStorage.removeItem('eq_token');
        sessionStorage.removeItem('eq_user');
        localStorage.removeItem('eq_token');
        localStorage.removeItem('eq_user');
        const storage = autoLogin ? localStorage : sessionStorage;
        storage.setItem('eq_token', token);
        storage.setItem('eq_user', username);
    }
    function initLoginForm() {
        const prefs = getAuthPrefs();
        let savedCred = null;
        try {
            savedCred = JSON.parse(localStorage.getItem(SAVED_CRED_KEY) || 'null');
        } catch (e) {}
        document.getElementById('remember-password').checked = Boolean(prefs.rememberPassword);
        document.getElementById('auto-login').checked = Boolean(prefs.autoLogin);
        if (savedCred) {
            document.getElementById('username').value = savedCred.username || '';
            if (prefs.rememberPassword) {
                document.getElementById('password').value = savedCred.password || '';
            }
        }
        if (prefs.autoLogin && localStorage.getItem('eq_token')) {
            window.location.href = 'index.html';
        }
    }
    function applyTheme(theme) {
        const nextTheme = theme === 'day' ? 'day' : 'night';
        document.documentElement.setAttribute('data-theme', nextTheme);
        localStorage.setItem('eq_theme', nextTheme);
        refreshThemeButton();
    }
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'night';
        applyTheme(currentTheme === 'night' ? 'day' : 'night');
    }
    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const rememberPassword = document.getElementById('remember-password').checked;
        const autoLogin = document.getElementById('auto-login').checked;
        const msgDiv = document.getElementById('message');
        if (!username || !password) {
            msgDiv.style.color = 'var(--danger)';
            msgDiv.innerText = t('fillRequired');
            return;
        }
        msgDiv.style.color = 'var(--muted)';
        msgDiv.innerText = t('verifying');
        try {
            const res = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok && data.code === 200) {
                msgDiv.style.color = 'var(--success)';
                msgDiv.innerText = getCurrentLanguage() === 'en-US' ? 'Login successful.' : data.msg;
                saveAuthPrefs(rememberPassword, autoLogin);
                saveCredentialSnapshot(username, password, rememberPassword);
                persistAuth(data.access_token, data.username, autoLogin);
                setTimeout(() => { window.location.href = 'index.html'; }, 700);
            } else {
                msgDiv.style.color = 'var(--danger)';
                msgDiv.innerText = `${t('loginFailed')}${data.detail || data.msg || t('retry')}`;
            }
        } catch (e) {
            msgDiv.style.color = 'var(--danger)';
            msgDiv.innerText = t('networkError');
        }
    }
    applyLanguage(getCurrentLanguage());
    applyTheme(localStorage.getItem('eq_theme') || 'night');
    initLoginForm();
    document.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
